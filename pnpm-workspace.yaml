packages:
  - apps/*
  - packages/*

overrides:
  "@hono/node-server": 2.0.11
  "@sentry/node": 10.60.0
  esbuild: 0.28.1
  fast-uri: 3.1.4
  sharp: 0.35.3

# Exact transitive versions with upstream deprecation notices. Keep this list
# narrow so upgrades surface new notices instead of hiding them globally.
allowedDeprecatedVersions:
  prebuild-install: 7.1.3
  whatwg-encoding: 3.1.1

allowBuilds:
  esbuild@0.28.1: true
  sharp@0.35.3: true
  workerd@1.20260714.1: true

minimumReleaseAgeExclude:
  - '@iannuttall/seo-graph-astro'
  - '@iannuttall/seo-graph-core'
  - miniflare@4.20260708.1
  - wrangler@4.110.0
  - '@cloudflare/workers-types@5.20260716.1'
  - '@hono/node-server@2.0.11'
