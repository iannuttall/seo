name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Run npm publish without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.10.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Use an npm CLI with trusted publishing support
        run: npm install --global npm@11.10.0
      - run: pnpm install --frozen-lockfile
      - name: Inject shared desktop OAuth client
        run: pnpm auth:inject-shared-client
        env:
          SEO_GOOGLE_CLIENT_ID: ${{ secrets.SEO_GOOGLE_CLIENT_ID }}
          SEO_GOOGLE_CLIENT_SECRET: ${{ secrets.SEO_GOOGLE_CLIENT_SECRET }}
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
      - run: pnpm security:audit
      - name: Publish dry run
        if: inputs.dryRun == 'true'
        run: npm publish --dry-run
      - name: Publish to npm
        if: inputs.dryRun == 'false'
        run: npm publish --access public --provenance
