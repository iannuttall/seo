name: Release

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Run npm publish without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
permissions:
  contents: write
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.10.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Inject shared desktop OAuth client
        run: pnpm auth:inject-shared-client
        env:
          SEO_GOOGLE_CLIENT_ID: ${{ secrets.SEO_GOOGLE_CLIENT_ID }}
          SEO_GOOGLE_CLIENT_SECRET: ${{ secrets.SEO_GOOGLE_CLIENT_SECRET }}
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm lint
      - name: Publish dry run
        if: inputs.dryRun == 'true'
        run: pnpm publish --dry-run --no-git-checks
      - name: Publish to npm
        if: inputs.dryRun == 'false'
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
