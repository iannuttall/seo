name: Release

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - ".github/workflows/release.yml"
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Run npm publish without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
      - uses: pnpm/action-setup@v6
        with:
          version: 11.11.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: Use an npm CLI with trusted publishing support
        run: npm install --global npm@11.10.0
      - name: Read release version
        id: release
        shell: bash
        run: |
          version="$(node --print "require('./package.json').version")"
          tag="v${version}"

          if npm view "seo@${version}" version >/dev/null 2>&1; then
            published="true"
          else
            published="false"
          fi

          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            tagged="true"
          else
            tagged="false"
          fi

          if [[ "${published}" == "false" && "${tagged}" == "true" ]]; then
            echo "${tag} exists, but seo@${version} is not published." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "published=${published}" >> "$GITHUB_OUTPUT"
          echo "tagged=${tagged}" >> "$GITHUB_OUTPUT"
      - run: pnpm install --frozen-lockfile
      - name: Inject shared desktop OAuth client
        run: pnpm auth:inject-shared-client
        env:
          SEO_GOOGLE_CLIENT_ID: ${{ secrets.SEO_GOOGLE_CLIENT_ID }}
          SEO_GOOGLE_CLIENT_SECRET: ${{ secrets.SEO_GOOGLE_CLIENT_SECRET }}
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:package-install
      - run: pnpm lint
      - run: pnpm security:check
      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dryRun == 'true'
        run: npm publish --dry-run
      - name: Publish to npm
        if: steps.release.outputs.published == 'false' && (github.event_name == 'push' || inputs.dryRun == 'false')
        run: npm publish --access public --provenance
      - name: Tag published version
        if: steps.release.outputs.published == 'false' && (github.event_name == 'push' || inputs.dryRun == 'false')
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$RELEASE_TAG" --message "Release seo@$RELEASE_VERSION"
          git push origin "$RELEASE_TAG"
      - name: Report existing release
        if: steps.release.outputs.published == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: echo "seo@$RELEASE_VERSION is already published; nothing to release."
